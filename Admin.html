<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Admin Console (STAGING)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1e293b; overflow: hidden; } 
        .hidden-view { display: none !important; }
        
        /* 세련된 커스텀 스크롤바 (PC용) */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .photo-grid img { cursor: pointer; transition: transform 0.2s ease-out; }
        .photo-grid img:hover { transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .font-signature { font-family: 'Playfair Display', serif; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 데스크톱 표 헤더 고정 */
        .sticky-header th { position: sticky; top: 0; z-index: 10; background-color: #f8fafc; }
    </style>
</head>
<body class="antialiased min-h-screen flex selection:bg-indigo-500 selection:text-white w-full h-screen">

    <!-- [스플래시 뷰] -->
    <div id="view-splash" class="w-full h-full flex items-center justify-center absolute inset-0 z-[100] bg-slate-900 transition-opacity duration-500">
        <div class="text-center fade-in">
            <svg class="animate-spin h-12 w-12 text-indigo-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p class="text-indigo-300 font-bold tracking-widest text-sm">시스템 인증 및 동기화 중...</p>
        </div>
    </div>

    <!-- [로그인 뷰] -->
    <div id="view-login" class="hidden-view w-full h-full flex items-center justify-center bg-slate-900 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black relative overflow-hidden z-50">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-10 right-1/4 w-96 h-96 bg-cyan-600/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="bg-white/10 backdrop-blur-xl p-12 rounded-[2rem] shadow-2xl border border-white/10 w-full max-w-md fade-in relative z-10">
            <div class="text-center mb-10">
                <span class="bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full text-[10px] font-black tracking-widest border border-indigo-500/30 uppercase">Admin Console</span>
                <h1 class="text-5xl font-black mt-5 text-white font-signature tracking-wide">Signature</h1>
                <p class="text-slate-400 text-sm mt-3 font-medium tracking-wide">통합 학습 관리 시스템 (STAGING)</p>
            </div>
            <div class="space-y-6">
                <div>
                    <input type="text" id="adminId" placeholder="아이디" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all font-medium">
                </div>
                <div>
                    <input type="password" id="adminPw" placeholder="비밀번호" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all font-medium" id="loginPwInput">
                </div>
                <button data-action="login" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(79,70,229,0.3)] mt-2" id="btnLogin">시스템 접속</button>
            </div>
            <p id="loginError" class="text-red-400 text-sm text-center mt-6 font-bold hidden"></p>
        </div>
    </div>

    <!-- [메인 데스크톱 뷰] -->
    <div id="view-main" class="hidden-view w-full h-full flex flex-row overflow-hidden">
        
        <!-- 고정 사이드바 -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 shadow-2xl z-20 relative">
            <div class="p-6 border-b border-slate-800">
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tight font-signature">Signature</h2>
                <p id="adminNameDisplay" class="text-xs text-indigo-300 mt-2 font-bold px-2 py-1 bg-indigo-900/30 rounded inline-block"></p>
            </div>
            
            <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto custom-scrollbar">
                <p class="px-4 text-[10px] font-bold text-slate-500 mb-2 mt-2 uppercase tracking-wider">Overview</p>
                <button data-action="nav" data-value="dashboard" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium text-sm transition-colors bg-slate-800 text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg> 대시보드
                </button>
                
                <p class="px-4 text-[10px] font-bold text-slate-500 mb-2 mt-6 uppercase tracking-wider">Management</p>
                <button data-action="nav" data-value="users" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg> 계정 관리
                </button>
                <button data-action="nav" data-value="attendance" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 출결 관리
                </button>
                
                <p class="px-4 text-[10px] font-bold text-slate-500 mb-2 mt-6 uppercase tracking-wider">Tasks & Tests</p>
                <button data-action="nav" data-value="homework" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg> 숙제 검수
                </button>
                <button data-action="nav" data-value="unsubmitted" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 미제출자 독촉
                </button>
                <button data-action="nav" data-value="reports" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> 테스트 리포트
                </button>
                
                <p class="px-4 text-[10px] font-bold text-slate-500 mb-2 mt-6 uppercase tracking-wider">Communication</p>
                <button data-action="nav" data-value="board" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg> 알림 & 자료실
                </button>
            </nav>
            
            <div class="p-4 border-t border-slate-800">
                <button data-action="logout" class="w-full flex items-center justify-center gap-2 bg-slate-800 text-slate-400 font-bold py-3 rounded-lg hover:bg-red-500/20 hover:text-red-400 transition-colors text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg> 로그아웃
                </button>
            </div>
        </aside>

        <!-- 우측 메인 영역 (독립 스크롤) -->
        <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative">
            <header class="bg-white px-10 py-5 border-b border-slate-200 sticky top-0 z-10 flex justify-between items-center shadow-sm shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-2xl font-bold text-slate-800 tracking-tight" id="panelTitle">대시보드</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div id="loadingIndicator" class="hidden items-center gap-2 text-indigo-600 font-bold text-sm bg-indigo-50 px-4 py-2 rounded-lg border border-indigo-100">
                        <svg class="animate-spin w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 통신 중...
                    </div>
                    <button data-action="refresh" class="flex items-center gap-2 text-sm bg-white hover:bg-slate-50 text-slate-600 font-bold px-4 py-2 rounded-lg border border-slate-300 shadow-sm transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 새로고침
                    </button>
                </div>
            </header>
            
            <main class="flex-1 overflow-y-auto custom-scrollbar p-10 fade-in" id="panelContainer"></main>
        </div>
    </div>

    <!-- [PC 최적화: 넓은 입력 모달] -->
    <div id="formModal" class="fixed inset-0 bg-slate-900/50 z-[90] hidden-view flex justify-center items-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-3xl flex flex-col max-h-[90vh] shadow-2xl border border-slate-200">
            <div class="px-8 py-5 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-2xl shrink-0">
                <h3 class="text-xl font-bold text-slate-800" id="formModalTitle">타이틀</h3>
                <button data-action="closeModal" data-value="formModal" class="text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-8 overflow-y-auto custom-scrollbar flex-1 bg-white" id="formModalContent"></div>
            <div class="px-8 py-5 border-t border-slate-200 bg-slate-50 rounded-b-2xl flex justify-end gap-3 shrink-0">
                <button data-action="closeModal" data-value="formModal" class="px-6 py-2.5 bg-white border border-slate-300 text-slate-700 font-bold rounded-xl hover:bg-slate-100 transition-colors">취소</button>
                <button data-action="submitForm" class="px-8 py-2.5 bg-indigo-600 text-white font-bold rounded-xl shadow-md hover:bg-indigo-700 transition-colors">저장하기</button>
            </div>
        </div>
    </div>
    
    <!-- [사진 뷰어 모달] -->
    <div id="photoViewerModal" class="fixed inset-0 bg-slate-900/95 z-[100] hidden-view flex flex-col justify-center items-center p-8 backdrop-blur-md">
        <div class="absolute top-6 right-6 z-50">
            <button data-action="closeModal" data-value="photoViewerModal" class="text-slate-300 bg-slate-800 rounded-full p-3 hover:bg-slate-700 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="max-w-6xl w-full flex gap-6 overflow-x-auto custom-scrollbar pb-6 snap-x photo-grid" id="photoViewerContainer"></div>
        <p class="text-slate-400 mt-4 text-sm font-medium">사진을 클릭하면 새 창에서 원본 크기로 봅니다.</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxpgvFDA7o3EUt9VVLW5q7Ofdg7UWW-aHbrfF7dxevuXmoGujaWCXpzCmUfcThcWvcD/exec";
        
        let state = { users: [], classes: [], homework: [], unsubmitted: [], reports: [], attendance: [], board: [], unsubParams: null, attParams: null, adminRole: '' };
        let currentTab = 'dashboard';
        let currentFormContext = null;
        let tempReportPhotos = [];
        let tempWrongAnswers = [];

        function escapeHTML(str) { return str ? String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        function getToken() { return sessionStorage.getItem('sig_admin_token'); }
        function setToken(token) { sessionStorage.setItem('sig_admin_token', token); }
        function showLoading(show) { document.getElementById('loadingIndicator').style.display = show ? 'flex' : 'none'; }
        function getTodayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

        // 안전한 외부 링크 열기 (XSS 방어 및 프로토콜 검증)
        function safeOpenUrl(url) {
            try { 
                const u = new URL(url); 
                if(u.protocol === 'http:' || u.protocol === 'https:') {
                    window.open(u.href, '_blank', 'noopener,noreferrer'); 
                }
            } catch(e) {
                console.warn('Invalid URL:', url);
            }
        }

        async function apiCall(action, payload = {}, hideLoader = false) {
            if(!hideLoader) showLoading(true);
            payload.action = action; payload.adminToken = getToken();
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.code === 'AUTH_FAILED') { sessionStorage.clear(); location.reload(); throw new Error("인증 만료"); }
                if(!data.success) throw new Error(data.reason || "오류 발생");
                return data;
            } finally { if(!hideLoader) showLoading(false); }
        }

        // ==========================================
        // Event Delegation (XSS 방어 및 스크립트 최적화)
        // ==========================================
        document.addEventListener('click', async e => {
            const btn = e.target.closest('[data-action]');
            if(!btn) return;
            const act = btn.dataset.action;
            const val = btn.dataset.value;
            const idx = btn.dataset.index !== undefined ? parseInt(btn.dataset.index) : null;

            if(act === 'login') handleLogin();
            else if(act === 'logout') { sessionStorage.clear(); location.reload(); }
            else if(act === 'nav') {
                currentTab = val;
                document.querySelectorAll('.sidebar-btn').forEach(b => {
                    b.classList.remove('bg-slate-800', 'text-white');
                    b.classList.add('text-slate-300');
                });
                btn.classList.add('bg-slate-800', 'text-white');
                btn.classList.remove('text-slate-300');
                loadPanel(currentTab);
            }
            else if(act === 'refresh') loadPanel(currentTab, true);
            else if(act === 'closeModal') document.getElementById(val).classList.add('hidden-view');
            else if(act === 'submitForm') handleFormSubmit();

            // Users
            else if(act === 'openUserForm') openUserForm(idx);
            else if(act === 'deleteUser') deleteUser(idx, btn.dataset.name);

            // Homework
            else if(act === 'deleteBatchHomework') deleteBatchHomework();
            else if(act === 'sendBatchReview') sendBatchReviewAlimtalk();
            else if(act === 'openReviewForm') openHwReviewModal(idx);
            else if(act === 'openPhoto') openPhotoViewer(btn.dataset.url);

            // Unsubmitted
            else if(act === 'fetchUnsubmitted') fetchUnsubmitted();
            else if(act === 'sendUrge') sendUrgeAlimtalk();

            // Reports
            else if(act === 'openReportForm') openReportForm(idx);
            else if(act === 'addWrongAnswer') addWrongAnswer();
            else if(act === 'removeWrongAnswer') removeWrongAnswer(idx);
            else if(act === 'triggerRepPhoto') document.getElementById('repPhotoInput').click();

            // Attendance
            else if(act === 'fetchAttendance') fetchAttendance();
            else if(act === 'saveAttendance') saveAttendanceBatch();

            // Board 
            else if(act === 'openBoardForm') openBoardForm(idx);
            else if(act === 'deleteBoard') deleteBoard(idx);
            
            // 안전한 링크 열기 적용
            else if(act === 'openLink') { safeOpenUrl(btn.dataset.url); }
        });

        document.getElementById('adminPw').addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });

        document.addEventListener('change', e => {
            if (e.target.id === 'hwSelectAll') {
                document.querySelectorAll('.hw-chk').forEach(cb => {
                    if(cb.closest('tr').style.display !== 'none') cb.checked = e.target.checked;
                });
            } else if (e.target.id === 'hwClassFilter' || e.target.id === 'hwStatusFilter') {
                filterHomework();
            } else if (e.target.classList.contains('att-status')) {
                updateAttStatusColor(e.target);
            } else if (e.target.id === 'f_r_id') {
                autoFillStudentName();
            } else if (e.target.id === 'repPhotoInput') {
                handleRepPhoto(e);
            }
        });

        document.addEventListener('input', e => {
            if (e.target.id === 'userSearch') filterUsers();
            else if (e.target.id === 'hwNameSearch') filterHomework();
            else if (e.target.id === 'reportTestSearch' || e.target.id === 'reportNameSearch') filterReports();
        });

        window.onload = async () => {
            const splash = document.getElementById('view-splash');
            if(getToken()) {
                try {
                    const res = await apiCall('adminValidateSession', {}, true);
                    state.adminRole = res.admin.role; // 권한 저장
                    document.getElementById('adminNameDisplay').innerText = escapeHTML(res.admin.name) + ' (' + escapeHTML(res.admin.role) + ')';
                    await loadGlobalData(true);
                    loadPanel('dashboard');
                    splash.classList.add('hidden-view'); 
                    document.getElementById('view-main').classList.remove('hidden-view');
                } catch(e) { splash.classList.add('hidden-view'); document.getElementById('view-login').classList.remove('hidden-view'); }
            } else {
                splash.classList.add('hidden-view'); document.getElementById('view-login').classList.remove('hidden-view');
            }
        };

        async function handleLogin() {
            const id = document.getElementById('adminId').value.trim();
            const pw = document.getElementById('adminPw').value.trim();
            if(!id || !pw) return;
            const err = document.getElementById('loginError'); err.classList.add('hidden');
            const btn = document.getElementById('btnLogin'); btn.textContent = "검증 중..."; btn.disabled = true;
            
            try {
                const data = await apiCall('adminLogin', {id, pw}, true);
                setToken(data.adminToken);
                state.adminRole = data.admin.role; // 권한 저장
                document.getElementById('adminNameDisplay').innerText = escapeHTML(data.admin.name) + ' (' + escapeHTML(data.admin.role) + ')';
                await loadGlobalData(true);
                document.getElementById('view-login').classList.add('hidden-view');
                document.getElementById('view-main').classList.remove('hidden-view');
                loadPanel('dashboard');
            } catch(e) {
                err.innerText = e.message; err.classList.remove('hidden');
            } finally { btn.textContent = "시스템 접속"; btn.disabled = false; }
        }

        async function loadGlobalData(hideLoader) {
            const res = await apiCall('adminListUsers', {}, hideLoader);
            state.users = res.data; state.classes = res.classes || [];
        }

        // ======================= Sub Functions (PC Width Adjustments) =======================
        function filterUsers() {
            const t = document.getElementById('userSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.dataset.search.toLowerCase().includes(t)?'':'none');
        }

        function filterHomework() {
            const c = document.getElementById('hwClassFilter').value;
            const s = document.getElementById('hwStatusFilter').value;
            const n = document.getElementById('hwNameSearch') ? document.getElementById('hwNameSearch').value.toLowerCase().trim() : '';
            
            document.querySelectorAll('.hw-row').forEach(r => {
                const matchClass = (c === '' || r.dataset.class === c);
                const matchStatus = (s === '' || r.dataset.status === s);
                const matchName = (n === '' || (r.dataset.name && r.dataset.name.toLowerCase().includes(n)));
                
                r.style.display = (matchClass && matchStatus && matchName) ? '' : 'none';
            });
        }
        
        function filterReports() {
            const tSearch = document.getElementById('reportTestSearch') ? document.getElementById('reportTestSearch').value.toLowerCase().trim() : '';
            const nSearch = document.getElementById('reportNameSearch') ? document.getElementById('reportNameSearch').value.toLowerCase().trim() : '';
            
            document.querySelectorAll('.report-row').forEach(r => {
                const matchTest = (tSearch === '' || (r.dataset.testname && r.dataset.testname.toLowerCase().includes(tSearch)));
                const matchStudent = (nSearch === '' || (r.dataset.student && r.dataset.student.toLowerCase().includes(nSearch)));
                
                r.style.display = (matchTest && matchStudent) ? '' : 'none';
            });
        }

        async function saveBoard() {
            const data = {
                targetClass: document.getElementById('f_b_class').value,
                date: document.getElementById('f_b_date').value,
                category: document.getElementById('f_b_category').value,
                title: document.getElementById('f_b_title').value.trim(),
                content: document.getElementById('f_b_content').value.trim(),
                link: document.getElementById('f_b_link').value.trim()
            };
            if(!data.title || !data.content) return alert("제목과 내용은 필수입니다.");
            const row = document.getElementById('f_b_row').value;
            try {
                await apiCall('adminSaveBoard', { boardData: data, rowIndex: row ? parseInt(row) : null });
                document.getElementById('formModal').classList.add('hidden-view');
                loadPanel('board', true);
            } catch(e) { alert(e.message); }
        }

            try {
                await apiCall('adminDeleteBoard', { rowIndex });
                loadPanel('board', true);
            } catch(e) { alert(e.message); }
        }

        function resizeImageClientSide(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const cvs = document.createElement('canvas'); let w=img.width, h=img.height, max=1600; 
                        if(w>max) { h=Math.round(h*max/w); w=max; } cvs.width=w; cvs.height=h;
                        cvs.getContext('2d').drawImage(img,0,0,w,h);
                        res({data:cvs.toDataURL('image/jpeg',0.75), mimeType:'image/jpeg'});
                    }; img.src = e.target.result;
                }; reader.readAsDataURL(file);
            });
        }

        }

                for(let file of tempReportPhotos) data.images.push(await resizeImageClientSide(file));

            const targetUsers = state.users.filter(u => u.role === '학생' && u.className === state.attParams.className).sort((x,y)=>x.name.localeCompare(y.name));
            
            if(!targetUsers.length) return a.innerHTML = '<div class="bg-slate-50 p-10 rounded-2xl text-center border border-slate-200"><p class="text-slate-500 font-bold text-lg">해당 반에 등록된 학생이 없습니다.</p></div>';
            
            let h = `<div class="mb-4 flex justify-between items-center"><p class="text-slate-600 font-bold text-sm">조회된 학생 명단: <span class="text-indigo-600 text-lg mx-1">${targetUsers.length}</span>명</p><button data-action="saveAttendance" class="bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-emerald-700 transition flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 수정 사항 일괄 저장</button></div>`;
            h += `<div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm"><div class="overflow-x-auto"><table class="w-full text-left text-sm whitespace-nowrap sticky-header"><thead class="bg-slate-50 border-b border-slate-200 text-slate-600 font-bold"><tr><th class="p-4 w-40">이름</th><th class="p-4 w-48 text-center">출석 상태 변경</th><th class="p-4 min-w-[300px]">사유 및 특이사항 메모</th></tr></thead><tbody class="divide-y divide-slate-100">`;
            targetUsers.forEach(u => {
                const ex = state.attendance.find(e => e['아이디'] === u.id); const st = ex?ex['출결상태']:'미확인';
                let cls = 'att-status border rounded-xl p-2.5 text-sm font-bold w-full outline-none focus:ring-2 focus:ring-indigo-500 transition-colors shadow-sm cursor-pointer ';
                if(st==='출석') cls+='bg-green-50 text-green-700 border-green-300'; else if(st==='결석') cls+='bg-red-50 text-red-700 border-red-300'; else if(st==='지각') cls+='bg-yellow-50 text-yellow-700 border-yellow-300'; else if(st==='조퇴') cls+='bg-blue-50 text-blue-700 border-blue-300'; else cls+='bg-white text-slate-400 border-slate-300';
                
                h += `<tr class="hover:bg-slate-50 transition-colors att-row" data-id="${escapeHTML(u.id)}" data-name="${escapeHTML(u.name)}"><td class="p-4 font-bold text-slate-800 text-base">${escapeHTML(u.name)}</td><td class="p-4 px-6"><select class="${cls}"><option value="미확인" ${st==='미확인'?'selected':''}>- 미확인 -</option><option value="출석" ${st==='출석'?'selected':''}>🟢 출석</option><option value="결석" ${st==='결석'?'selected':''}>🔴 결석</option><option value="지각" ${st==='지각'?'selected':''}>🟡 지각</option><option value="조퇴" ${st==='조퇴'?'selected':''}>🔵 조퇴</option></select></td><td class="p-4 pr-6"><input type="text" class="att-memo border border-slate-300 p-2.5 rounded-xl w-full text-sm focus:border-indigo-500 outline-none bg-white" value="${escapeHTML(ex?ex['사유및메모']:'')}" placeholder="지각/결석 사유 등 입력"></td></tr>`;
            });
            a.innerHTML = h + '</tbody></table></div></div>';
        }
        function updateAttStatusColor(sel) {
            let cls = 'att-status border rounded-xl p-2.5 text-sm font-bold w-full outline-none focus:ring-2 focus:ring-indigo-500 transition-colors shadow-sm cursor-pointer ';
            if(sel.value === '출석') cls += 'bg-green-50 text-green-700 border-green-300';
            else if(sel.value === '결석') cls += 'bg-red-50 text-red-700 border-red-300';
            else if(sel.value === '지각') cls += 'bg-yellow-50 text-yellow-700 border-yellow-300';
            else if(sel.value === '조퇴') cls += 'bg-blue-50 text-blue-700 border-blue-300';
            else cls += 'bg-white text-slate-400 border-slate-300';
            sel.className = cls;
        }

        async function saveAttendanceBatch() {
            const list = Array.from(document.querySelectorAll('.att-row'))
                .map(r => ({
                    id: r.dataset.id, 
                    name: r.dataset.name, 
                    status: r.querySelector('.att-status').value, 
                    memo: r.querySelector('.att-memo').value.trim()
                }))
                .filter(item => item.status !== '미확인'); 

            if(list.length === 0) {
                alert("저장할 유효한 출결 데이터가 없습니다.\n('미확인' 상태인 학생은 데이터베이스로 전송되지 않습니다.)");
                return;
            }

            try { 
                await apiCall('adminSaveAttendance', {
                    date: state.attParams.date, 
                    className: state.attParams.className, 
                    classType: state.attParams.classType,
                    attendanceList: list
                }); 
                alert(`✅ 총 ${list.length}명 학생의 출결 상태가 성공적으로 데이터베이스에 저장되었습니다.`); 
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
